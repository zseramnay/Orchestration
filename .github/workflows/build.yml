name: Build Reference Document

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy matplotlib python-docx docxcompose adjustText

      - name: Install fonts (for matplotlib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          python -c "import matplotlib.font_manager; matplotlib.font_manager._load_fontmanager(try_read_cache=False)"

      - name: Build complete document
        run: |
          cd $GITHUB_WORKSPACE
          python Scripts/v6-html-docx/build_document_complet.py
        env:
          MPLBACKEND: Agg

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet Etude-Formants/Versions-html-and-docx/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Etude-Formants/Versions-html-and-docx/
          git commit -m "[auto-build] Rebuild reference document"
          git push
