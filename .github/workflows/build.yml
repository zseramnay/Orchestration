name: Build Reference Document

on:
  push:
    branches: [main]
    paths:
      - 'Scripts/v5-html-docx/**'
      - 'Resultats/*.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if commit was made by the bot (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[auto-build]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy matplotlib python-docx docxcompose

      - name: Install fonts (for matplotlib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          python -c "import matplotlib; matplotlib.font_manager._load_fontmanager(try_read_cache=False)"

      - name: Build complete document
        run: |
          cd $GITHUB_WORKSPACE
          python Scripts/v5-html-docx/build_document_complet.py
        env:
          MPLBACKEND: Agg

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet Versions-html-and-docx/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Versions-html-and-docx/
          git commit -m "[auto-build] Rebuild reference document"
          git push
